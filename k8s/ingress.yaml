apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: calculator-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: calculator.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: calculator-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: calculator-frontend
                port:
                  number: 3000
