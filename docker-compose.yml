version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: calculator-backend:latest
    container_name: calculator-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - calculator-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: calculator-frontend:latest
    container_name: calculator-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - calculator-network

networks:
  calculator-network:
    driver: bridge
